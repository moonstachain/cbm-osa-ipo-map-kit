name: leak-scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 红线扫描（内部标识/客户名哈希/口令/PII 不得出现在公开仓）
        # 2026-07-14 P0 修复：客户名词表从明文改为 sha256 摘要比对（本文件不再自曝敏感词），
        # 且扫描范围含 .github 自身（取消自我豁免）。技术标识用串接防自匹配。
        run: |
          set -e
          T1='ODYS''SEY'; T2='odyssey''_'; T3='b0ab''628'; T4='os-''zk'; T5='84k-''os'; T6='yiru''-'
          TECH="$T1|$T2|$T3|$T4|$T5|$T6"
          if grep -rnE "$TECH" --exclude-dir=.git .; then
            echo '::error::内部技术标识命中——公开仓禁含'; exit 1; fi
          python3 - <<'PY'
          import hashlib, pathlib, re, sys
          # 客户名/代号 sha256 前 16 hex（明文词表不入仓）：CJK 2-3 gram + ascii token 比对
          DIGESTS = {"914a58f379ff9ad1","d27432779ce8593c","eb2f8cf22d25541d","f4e6e2ca63387e6b",
                     "8e3d537f8b4e97e9","7484eba17cdebf25","2b50bb206d457343","947c8ea8d53dc291",
                     "ebd8d4b530a364be","728b2262bf2e4f3f"}
          def h(s): return hashlib.sha256(s.encode()).hexdigest()[:16]
          bad = []
          for p in pathlib.Path('.').rglob('*'):
              if not p.is_file() or '.git' in p.parts: continue
              if p.suffix in {'.png','.jpg','.gif','.ico','.woff','.woff2'}: continue
              try: t = p.read_text(encoding='utf-8', errors='ignore')
              except Exception: continue
              cjk = re.findall(r'[一-鿿]+', t)
              toks = set()
              for run in cjk:
                  for n in (2, 3):
                      toks.update(run[i:i+n] for i in range(len(run)-n+1))
              toks.update(w.lower() for w in re.findall(r'[A-Za-z]{4,}', t))
              hit = [k for k in toks if h(k) in DIGESTS]
              if hit: bad.append(f"{p}: {len(hit)} 处红线词（内容不回显）")
          if bad:
              print("::error::客户名红线命中——" + "; ".join(bad)); sys.exit(1)
          print("name-digest scan clean")
          PY
          if grep -rnE '(^|[^0-9.])1[3-9][0-9]{9}([^0-9.]|$)' --exclude-dir=.git .; then
            echo '::error::手机号 PII 命中'; exit 1; fi
          if grep -rnE '¥[0-9]' --exclude-dir=.git .; then
            echo '::error::金额命中——案例数据不出公开仓'; exit 1; fi
          echo 'leak-scan clean'
