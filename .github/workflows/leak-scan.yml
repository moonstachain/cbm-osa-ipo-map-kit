name: leak-scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 红线词扫描（内部标识/口令/PII 不得出现在公开仓）
        run: |
          set -e
          PATTERNS='ODYSSEY|odyssey_|b0ab628|84000|os-zk|yiru-|印经|水月|杨老师|杨青湖|明哥|徐志|shuiyue|mingge|xuzhi|yinjing|84k-os'
          if grep -rnE "$PATTERNS" --exclude-dir=.git --exclude-dir=.github .; then
            echo '::error::红线词命中——公开仓禁含内部标识/客户名'; exit 1; fi
          if grep -rnE '(^|[^0-9.])1[3-9][0-9]{9}([^0-9.]|$)' --exclude-dir=.git .; then
            echo '::error::手机号 PII 命中'; exit 1; fi
          if grep -rnE '¥[0-9]' --exclude-dir=.git .; then
            echo '::error::金额命中——案例数据不出公开仓'; exit 1; fi
          echo 'leak-scan clean'
